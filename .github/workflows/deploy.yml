name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write   # OIDC for AWS
  contents: read
  checks: write     # test reporter
  pull-requests: write  # coverage comment on PRs

env:
  AWS_REGION: us-east-1

# ── Backend tests ────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - run: pip install ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest \
            --tb=short \
            --junitxml=junit.xml \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Write coverage to job summary
        if: always()
        run: |
          echo "## Backend Test Coverage" >> $GITHUB_STEP_SUMMARY
          coverage report --format=markdown >> $GITHUB_STEP_SUMMARY \
            || coverage report >> $GITHUB_STEP_SUMMARY \
            || echo "Coverage data unavailable" >> $GITHUB_STEP_SUMMARY

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: backend/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            backend/junit.xml
            backend/coverage.xml

# ── Frontend tests & type check ──────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose --reporter=junit --outputFile=junit.xml

      - name: Write coverage to job summary
        if: always()
        run: |
          echo "## Frontend Test Coverage" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json 2>/dev/null \
            | node -e "
              const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).total;
              console.log('| Metric | Covered | Total | % |');
              console.log('|--------|---------|-------|---|');
              ['lines','statements','branches','functions'].forEach(k=>{
                const m=d[k];
                console.log(\`| \${k} | \${m.covered} | \${m.total} | \${m.pct.toFixed(1)}% |\`);
              });
            " >> $GITHUB_STEP_SUMMARY \
            || echo "Coverage data unavailable" >> $GITHUB_STEP_SUMMARY

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Tests
          path: frontend/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: |
            frontend/junit.xml
            frontend/coverage/

# ── Deploy backend (main only, after tests pass) ──────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-backend, test-frontend]
    env:
      ECR_REPO: ${{ secrets.ECR_REPO_URL }}
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f backend/Dockerfile \
            -t $ECR_REPO:$IMAGE_TAG \
            -t $ECR_REPO:latest \
            ./backend
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

# ── Deploy frontend (main only, after tests pass) ─────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://api.covers.nbrouwers.com
          VITE_COGNITO_DOMAIN: covers-nbrouwers.auth.us-east-1.amazoncognito.com
          VITE_COGNITO_CLIENT_ID: g0hoeghhvdmekbaeugueno00g
          VITE_COGNITO_REDIRECT_URI: https://covers.nbrouwers.com/auth/callback
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy static assets to S3
        # Long-lived cache for hashed assets (JS/CSS/images), no-cache for index.html
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.SITE_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.SITE_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
