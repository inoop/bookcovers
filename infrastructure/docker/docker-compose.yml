version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bookcovers
      POSTGRES_USER: bookcovers
      POSTGRES_PASSWORD: bookcovers_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookcovers"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+asyncpg://bookcovers:bookcovers_dev@postgres:5432/bookcovers
      STORAGE_BACKEND: local
      AUTH_PROVIDER: none
    volumes:
      - ../../backend/uploads:/app/uploads

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ../../frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
